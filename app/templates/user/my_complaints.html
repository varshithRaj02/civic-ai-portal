{% extends "layout.html" %}
{% block content %}

<div class="p-6">
  <h2 class="text-2xl font-bold mb-6">My Complaints</h2>

  <div class="grid grid-cols-3 gap-6">
    {% for c in complaints %}
    <div class="bg-[#151515] p-4 rounded-lg">
      <h3 class="font-semibold">{{ c.title }}</h3>
      <p class="text-sm text-gray-400">{{ c.category }} • {{ c.location }}</p>

      <p class="mt-2 text-sm">
        Status:
        <span class="text-[#C1121F]">{{ c.status }}</span>
      </p>

      {% if c.media %}
      <img src="{{ url_for('static', filename=c.media) }}"
           class="mt-3 rounded h-32 w-full object-cover">
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
