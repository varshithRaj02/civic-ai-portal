{% extends "layout.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-20 bg-[#151515] p-6 rounded">

<h2 class="text-xl mb-4">Forgot Password</h2>

<form method="POST">

<input
type="email"
name="email"
placeholder="Enter your email"
required
class="w-full p-3 bg-black border border-gray-700 rounded mb-4">

<button
class="w-full bg-[#C1121F] py-3 rounded">
Send Reset Link
</button>

</form>

</div>

{% endblock %}
