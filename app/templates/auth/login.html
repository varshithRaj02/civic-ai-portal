{% extends "layout.html" %}
{% block content %}

<div class="min-h-screen flex">

  <!-- LEFT LOGIN PANEL -->
  <div class="w-1/3 flex items-center justify-center bg-[#0f0f0f]">

    <div class="bg-[#151515] p-8 rounded-lg w-80 shadow-lg">

      <h2 class="text-xl font-semibold text-center mb-6">
        Civic Portal Login
      </h2>

      <form method="POST" class="space-y-4">

        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          class="w-full p-3 bg-black border border-gray-700 rounded focus:border-[#C1121F] outline-none"
        >

        <input
          type="password"
          name="password"
          placeholder="Password"
          required
          class="w-full p-3 bg-black border border-gray-700 rounded focus:border-[#C1121F] outline-none"
        >

        <button
          class="w-full bg-[#C1121F] py-3 rounded font-semibold hover:bg-red-700 transition">
          Login
        </button>

      </form>

      <div class="text-center mt-4 text-sm text-gray-400">

        <a href="{{ url_for('auth.forgot_password') }}" class="hover:text-white">
          Forgot Password?
        </a>

        <p class="mt-2">
          Don't have an account?
          <a href="{{ url_for('auth.register') }}" class="text-[#C1121F] hover:underline">
            Register
          </a>
        </p>

      </div>

    </div>

  </div>


  <!-- RIGHT HERO PANEL -->
  <div class="w-2/3 flex items-center justify-center">

    <div class="text-center">

      <h1 class="text-4xl font-bold mb-4">
        AI-Powered Civic Portal
      </h1>

      <p class="text-gray-400 text-lg">
        Smart grievance management with real-time analytics
        and AI prioritization.
      </p>

    </div>

  </div>

</div>

{% endblock %}
