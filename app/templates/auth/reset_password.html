{% extends "layout.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-20 bg-[#151515] p-6 rounded">

<h2 class="text-xl mb-4">Reset Password</h2>

<form method="POST">

<input
type="password"
name="password"
placeholder="New Password"
required
class="w-full p-3 bg-black border border-gray-700 rounded mb-4">

<button
class="w-full bg-[#C1121F] py-3 rounded">
Update Password
</button>

</form>

</div>

{% endblock %}
